apiVersion: v1
kind: Namespace
metadata:
  name: firecrawl
  labels:
    name: firecrawl
    managed-by: argocd
    environment: production
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: firecrawl-quota
  namespace: firecrawl
spec:
  hard:
    requests.cpu: "10"
    requests.memory: "20Gi"
    limits.cpu: "20"
    limits.memory: "40Gi"
    persistentvolumeclaims: "5"
    requests.storage: "50Gi"
    pods: "50"
    services: "10"
    configmaps: "20"
    secrets: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: firecrawl-limits
  namespace: firecrawl
spec:
  limits:
    - type: Container
      default:
        cpu: "1"
        memory: "2Gi"
      defaultRequest:
        cpu: "100m"
        memory: "256Mi"
      max:
        cpu: "4"
        memory: "8Gi"
      min:
        cpu: "50m"
        memory: "128Mi"
    - type: Pod
      max:
        cpu: "8"
        memory: "16Gi"
    - type: PersistentVolumeClaim
      max:
        storage: "20Gi"
      min:
        storage: "1Gi"
