apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-ui
  namespace: firecrawl
  labels:
    app: ingestion-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingestion-ui
  template:
    metadata:
      labels:
        app: ingestion-ui
    spec:
      serviceAccountName: firecrawl-ui
      containers:
        - name: ingestion-ui
          image: ingestion-ui
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
