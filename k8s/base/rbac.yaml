apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: firecrawl-configmap-reader
  namespace: firecrawl
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: firecrawl-api-configmap-binding
  namespace: firecrawl
subjects:
  - kind: ServiceAccount
    name: firecrawl-api
    namespace: firecrawl
roleRef:
  kind: Role
  name: firecrawl-configmap-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: firecrawl-worker-configmap-binding
  namespace: firecrawl
subjects:
  - kind: ServiceAccount
    name: firecrawl-worker
    namespace: firecrawl
roleRef:
  kind: Role
  name: firecrawl-configmap-reader
  apiGroup: rbac.authorization.k8s.io
