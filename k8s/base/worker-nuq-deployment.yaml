apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-nuq
  namespace: firecrawl
  labels:
    app: worker-nuq
    worker-type: nuq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-nuq
  template:
    metadata:
      labels:
        app: worker-nuq
        worker-type: nuq
    spec:
      serviceAccountName: firecrawl-app
      initContainers:
        # Wait for Postgres to be ready
        - name: wait-postgres
          image: busybox:1.36
          command:
            - 'sh'
            - '-c'
            - 'until nc -z postgres-service.firecrawl.svc.cluster.local 5432; do echo "Waiting for Postgres..."; sleep 2; done; echo "Postgres is ready"'
        # Wait for Redis to be ready
        - name: wait-redis
          image: busybox:1.36
          command:
            - 'sh'
            - '-c'
            - 'until nc -z redis-service.firecrawl.svc.cluster.local 6379; do echo "Waiting for Redis..."; sleep 2; done; echo "Redis is ready"'
      containers:
        - name: worker-nuq
          image: firecrawl-api
          env:
            # Worker type configuration
            - name: WORKER_TYPE
              value: "nuq"
            # Node.js heap tuning: 85% of 2048 MiB = 1740 MiB
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1740"
          envFrom:
            - configMapRef:
                name: firecrawl-application
            - configMapRef:
                name: firecrawl-database
            - configMapRef:
                name: firecrawl-redis
            - secretRef:
                name: firecrawl-secrets
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pgrep -f node || exit 1
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
