apiVersion: apps/v1
kind: Deployment
metadata:
  name: firecrawl-api
  namespace: firecrawl
  labels:
    app: firecrawl-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: firecrawl-api
  template:
    metadata:
      labels:
        app: firecrawl-api
    spec:
      serviceAccountName: firecrawl-api
      initContainers:
        # Wait for Postgres to be ready
        - name: wait-postgres
          image: busybox:1.36
          command:
            - 'sh'
            - '-c'
            - 'until nc -z postgres-service.firecrawl.svc.cluster.local 5432; do echo "Waiting for Postgres..."; sleep 2; done; echo "Postgres is ready"'
        # Wait for Redis to be ready
        - name: wait-redis
          image: busybox:1.36
          command:
            - 'sh'
            - '-c'
            - 'until nc -z redis-service.firecrawl.svc.cluster.local 6379; do echo "Waiting for Redis..."; sleep 2; done; echo "Redis is ready"'
      containers:
        - name: firecrawl-api
          image: firecrawl-api
          command: ["node", "dist/src/index.js"]
          ports:
            - containerPort: 3002
              name: http
          env:
            # Node.js heap tuning: 85% of 2048 MiB = 1740 MiB
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1740"
          envFrom:
            - configMapRef:
                name: firecrawl-application
            - configMapRef:
                name: firecrawl-database
            - configMapRef:
                name: firecrawl-redis
            - secretRef:
                name: firecrawl-database-secret
            - secretRef:
                name: firecrawl-secrets
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
