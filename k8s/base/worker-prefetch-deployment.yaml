apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-prefetch
  namespace: firecrawl
  labels:
    app: worker-prefetch
    worker-type: prefetch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-prefetch
  template:
    metadata:
      labels:
        app: worker-prefetch
        worker-type: prefetch
    spec:
      serviceAccountName: firecrawl-worker
      initContainers:
        # Wait for Postgres to be ready
        - name: wait-postgres
          image: busybox:1.36
          command:
            - 'sh'
            - '-c'
            - 'until nc -z postgres-service.firecrawl.svc.cluster.local 5432; do echo "Waiting for Postgres..."; sleep 2; done; echo "Postgres is ready"'
        # Wait for Redis to be ready
        - name: wait-redis
          image: busybox:1.36
          command:
            - 'sh'
            - '-c'
            - 'until nc -z redis-service.firecrawl.svc.cluster.local 6379; do echo "Waiting for Redis..."; sleep 2; done; echo "Redis is ready"'
        # Wait for RabbitMQ to be ready
        - name: wait-rabbitmq
          image: busybox:1.36
          command:
            - 'sh'
            - '-c'
            - 'until nc -z rabbitmq-service.firecrawl.svc.cluster.local 5672; do echo "Waiting for RabbitMQ..."; sleep 2; done; echo "RabbitMQ is ready"'
      containers:
        - name: worker-prefetch
          image: firecrawl-api
          command: ["node", "dist/src/services/worker/nuq-prefetch-worker.js"]
          env:
            # Worker type configuration
            - name: WORKER_TYPE
              value: "prefetch"
            # Node.js heap tuning: 85% of 1024 MiB = 870 MiB
            - name: NODE_OPTIONS
              value: "--max-old-space-size=870"
          envFrom:
            - configMapRef:
                name: firecrawl-application
            - configMapRef:
                name: firecrawl-database
            - configMapRef:
                name: firecrawl-redis
            - secretRef:
                name: firecrawl-database-secret
            - secretRef:
                name: firecrawl-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pgrep -f node || exit 1
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
