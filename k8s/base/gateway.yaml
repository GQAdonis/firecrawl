apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: firecrawl-gateway
  namespace: firecrawl
  labels:
    app: firecrawl
spec:
  gatewayClassName: eg
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.prometheusags.ai"
      allowedRoutes:
        namespaces:
          from: Same
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: prometheusags-wildcard-tls
            namespace: firecrawl
